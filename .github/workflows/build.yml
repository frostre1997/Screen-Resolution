name: Build Mod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android 64-bit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Compile Geode Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: Android64
          
